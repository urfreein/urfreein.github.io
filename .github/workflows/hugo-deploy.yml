# .github/workflows/hugo-deploy.yml 파일 내용
name: Deploy Hugo site to Pages

on:
  push:
    branches: ["master"] # master 브랜치에 푸시가 발생할 때 실행
  workflow_dispatch: # 수동 실행을 허용

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build: # 1. 빌드 Job (공백 2칸)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true 
          fetch-depth: 0    

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3 
        with:
          hugo-version: 'latest'
          extended: true 
          compiler: "dart-sass" # Sass 컴파일러 지정

      - name: Build Hugo
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy: # 2. 배포 Job (공백 2칸)
    environment: # (공백 4칸)
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build # 👈 오류가 발생했을 가능성이 높은 부분 (공백 4칸)
    steps: # (공백 4칸)
      - name: Deploy to GitHub Pages # (공백 6칸)
        id: deployment
        uses: actions/deploy-pages@v4
