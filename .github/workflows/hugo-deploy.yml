# .github/workflows/hugo-deploy.yml 파일 내용
name: Deploy Hugo site to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true 
          fetch-depth: 0    

      # 1. Node.js 환경 설정
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 2. Dart Sass를 npm을 통해 설치하고 $PATH 및 권한 설정 👈 최종 수정 부분
      - name: Install Dart Sass and Set Path
        run: |
          npm install -g sass
          NPM_GLOBAL_BIN=$(npm prefix -g)/bin
          echo "NPM_GLOBAL_BIN=$NPM_GLOBAL_BIN" >> $GITHUB_ENV
          echo "$NPM_GLOBAL_BIN" >> $GITHUB_PATH
          
          SASS_PATH="$NPM_GLOBAL_BIN/sass"
          # read(4) + write(2) + execute(1) = 7 (owner)
          # read(4) + execute(1) = 5 (group, others)
          chmod 755 $SASS_PATH || true
          which sass

      # 3. Hugo 설정
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true 

      # 4. 모듈 및 캐시 정리
      - name: Clean Hugo Cache and Modules
        run: |
          rm -rf ~/.cache/hugo_cache
          hugo mod tidy

      # 5. 빌드
      - name: Build Hugo
        run: hugo --minify

      # 6. 아티팩트 업로드
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

