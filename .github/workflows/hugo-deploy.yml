# .github/workflows/hugo-deploy.yml 파일 내용
name: Deploy Hugo site to Pages

on:
  push:
    branches: ["master"] # master 브랜치에 푸시가 발생할 때 실행
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true 
          fetch-depth: 0    

      # 1. Node.js 환경 설정 (Sass 설치를 위해)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 2. Dart Sass를 npm을 통해 전역 설치 (경로 문제 해결)
      - name: Install Dart Sass
        run: sudo npm install -g sass

      # 3. Hugo 설정
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true 
          # compiler 옵션은 npm 설치로 대체되므로 생략하거나 그대로 둡니다.

      # 4. 모듈 및 캐시 정리
      - name: Clean Hugo Cache and Modules
        run: |
          rm -rf ~/.cache/hugo_cache
          hugo mod tidy
          hugo mod vendor

      # 5. 빌드
      - name: Build Hugo
        run: hugo --minify

      # 6. 아티팩트 업로드
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
